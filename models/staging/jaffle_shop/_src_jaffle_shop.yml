version: 2

sources:
  - name: jaffle_shop
    database: dbt-tutorial
    schema: jaffle_shop
    description: A clone of a PostgreSQL database
    config:
      freshness:
        warn_after:
          count: 12
          period: hour
        error_after:
          count: 24
          period: hour
      loaded_at_field: _etl_loaded_at

    tables:
      - name: customers
        description: Raw customer data
        columns:
          - name: id
            description: Primary key for the customer data
            tests:
              - unique
              - not_null
        config:
          freshness: null
          loaded_at_field: null
      - name: orders
        description: Raw orders data
        columns:
          - name: id
            description: Primary key for order data
            tests:
              - unique
              - not_null